# Render Blueprint for Analizator Wydatkow
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: analizator-wydatkow
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: gunicorn analizator_wydatkow.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13.3"
      - key: DATABASE_URL
        fromDatabase:
          name: analizator-db
          property: connectionString

databases:
  - name: analizator-db
    plan: free  # ⚠️ Expires in 30 days — upgrade to basic ($7/mo) before expiry
    databaseName: analizator_wydatkow
    user: analizator_user
